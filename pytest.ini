[pytest]
filterwarnings =
    ignore:Trying to unpickle estimator .* when using version .*:sklearn.exceptions.InconsistentVersionWarning
markers =
    integration: Marks integration tests that involve multiple components or external APIs.
    ratelimit_perf: Marks rate-limit concurrency and throughput validation tests.
    ratelimit_soak: Marks optional long-run memory soak validation tests.
